<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background -->
  <rect width="100" height="100" rx="18" fill="#EDE9E0"/>
  <!-- cube — isometric, rust/terracotta palette -->
  <!-- top face -->
  <polygon points="50,18 78,34 50,50 22,34" fill="#C94E1E"/>
  <!-- left face -->
  <polygon points="22,34 50,50 50,76 22,60" fill="#9A3912"/>
  <!-- right face -->
  <polygon points="78,34 50,50 50,76 78,60" fill="#B34418"/>
  <!-- top face highlight square -->
  <polygon points="50,24 72,36 50,48 28,36" fill="#D4603A" opacity="0.4"/>
  <!-- white inset on right face -->
  <polygon points="54,54 74,43 74,66 54,77" fill="#F5F0E8" opacity="0.85"/>
</svg>
